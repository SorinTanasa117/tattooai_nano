<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InkFrame — Tattoo Placement Widget</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://unpkg.com/konva@9.3.20/konva.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">◈</span>
      <span class="name">InkFrame</span>
      <span class="tag">tattoo placement widget</span>
    </div>
    <div class="status-pill" id="statusPill">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Idle</span>
    </div>
  </header>

  <main class="layout">
    <section class="canvas-pane">
      <div id="canvasHost" class="canvas-host"></div>
      <div class="canvas-overlay" id="canvasOverlay">
        <div class="overlay-content">
          <div class="overlay-title">Upload a body photo to begin</div>
          <div class="overlay-sub">JPEG or PNG · under 25 MB</div>
        </div>
      </div>
      <div class="canvas-result" id="canvasResult" hidden>
        <img id="canvasResultImage" alt="Rendered tattoo" />
        <button class="btn btn-ghost canvas-result-back" id="canvasResultBack">
          <span class="btn-icon">←</span>
          <span>Back to editor</span>
        </button>
      </div>
    </section>

    <aside class="sidebar">
      <div class="panel">
        <div class="panel-title">1 · Uploads</div>
        <div class="upload-row">
          <label class="btn btn-ghost">
            <input type="file" id="bodyInput" accept="image/*" hidden />
            <span class="btn-label">Body photo</span>
            <span class="btn-hint" id="bodyHint">choose file</span>
          </label>
          <label class="btn btn-ghost">
            <input type="file" id="tattooInput" accept="image/*" hidden />
            <span class="btn-label">Tattoo design</span>
            <span class="btn-hint" id="tattooHint">choose file</span>
          </label>
        </div>
        <div class="quick-row">
          <button class="btn btn-mini" id="fitBtn" disabled>Reset tattoo</button>
          <button class="btn btn-mini" id="centerBtn" disabled>Center</button>
        </div>
        <div class="steal-area">
          <input type="file" id="stealInput" accept="image/*" hidden />
          <button class="btn btn-steal" id="stealBtn">
            <span class="btn-icon">✦</span>
            <span class="btn-label">Steal Tattoo</span>
            <span class="btn-hint" id="stealHint">choose source photo</span>
          </button>
          <div class="steal-progress" id="stealProgress" hidden>
            <div class="spinner steal-spinner"></div>
            <div class="progress-text" id="stealProgressText">Uploading…</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">2 · Placement</div>
        <div class="slider-row">
          <label>X</label>
          <button class="slider-step" type="button" data-target="xSlider" data-dir="-1" aria-label="Decrease X">−</button>
          <input type="range" id="xSlider" min="0" max="2000" value="500" disabled />
          <button class="slider-step" type="button" data-target="xSlider" data-dir="+1" aria-label="Increase X">+</button>
          <output id="xOut">500</output>
        </div>
        <div class="slider-row">
          <label>Y</label>
          <button class="slider-step" type="button" data-target="ySlider" data-dir="-1" aria-label="Decrease Y">−</button>
          <input type="range" id="ySlider" min="0" max="2000" value="500" disabled />
          <button class="slider-step" type="button" data-target="ySlider" data-dir="+1" aria-label="Increase Y">+</button>
          <output id="yOut">500</output>
        </div>
        <div class="slider-row">
          <label>Width</label>
          <button class="slider-step" type="button" data-target="widthSlider" data-dir="-1" aria-label="Decrease Width">−</button>
          <input type="range" id="widthSlider" min="50" max="1500" value="380" disabled />
          <button class="slider-step" type="button" data-target="widthSlider" data-dir="+1" aria-label="Increase Width">+</button>
          <output id="widthOut">380 px</output>
        </div>
        <div class="slider-row">
          <label>Height</label>
          <button class="slider-step" type="button" data-target="heightSlider" data-dir="-1" aria-label="Decrease Height">−</button>
          <input type="range" id="heightSlider" min="50" max="1500" value="380" disabled />
          <button class="slider-step" type="button" data-target="heightSlider" data-dir="+1" aria-label="Increase Height">+</button>
          <output id="heightOut">380 px</output>
        </div>
        <div class="slider-row">
          <label>Opacity</label>
          <button class="slider-step" type="button" data-target="opacitySlider" data-dir="-1" aria-label="Decrease opacity">−</button>
          <input type="range" id="opacitySlider" min="0" max="100" value="50" step="1" disabled />
          <button class="slider-step" type="button" data-target="opacitySlider" data-dir="+1" aria-label="Increase opacity">+</button>
          <output id="opacityOut">50%</output>
        </div>
        <div class="slider-row">
          <label>Angle</label>
          <button class="slider-step" type="button" data-target="rotationSlider" data-dir="-1" aria-label="Decrease Angle">−</button>
          <input type="range" id="rotationSlider" min="0" max="359" value="0" step="1" disabled />
          <button class="slider-step" type="button" data-target="rotationSlider" data-dir="+1" aria-label="Increase Angle">+</button>
          <output id="rotationOut">0°</output>
        </div>
      </div>

      <div class="panel panel-render">
        <div class="panel-title">3 · Render</div>
        <button class="btn btn-primary" id="renderBtn" disabled>
          <span class="btn-icon">✦</span>
          <span class="btn-text">Render in ComfyUI</span>
        </button>
        <div class="render-progress" id="renderProgress" hidden>
          <div class="spinner"></div>
          <div class="progress-text" id="progressText">Uploading to ComfyUI…</div>
        </div>
        <div class="render-error" id="renderError" hidden></div>
      </div>

      <div class="panel panel-result" id="resultPanel" hidden>
        <div class="panel-title">4 · Result</div>
        <div class="result-image-wrap">
          <img id="resultImage" alt="Rendered tattoo" />
        </div>
        <div class="result-actions">
          <a class="btn btn-ghost" id="downloadBtn" download>
            <span class="btn-icon">↓</span>
            <span>Download</span>
          </a>
          <button class="btn btn-mini" id="rerenderBtn">Re-render</button>
        </div>
        <div class="result-meta" id="resultMeta"></div>
      </div>
    </aside>
  </main>

  <div class="toast" id="toast" hidden></div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
