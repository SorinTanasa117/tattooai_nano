[build]
  # No bundler/build step needed — the frontend is plain static files.
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # server.js is the local-only dev server (not used by Netlify Functions).
  # Its default fallback values for PORT / RENDER_TIMEOUT_MS happen to match
  # the literal values of the build's env vars of the same name, which trips
  # Netlify's secrets scanner as a false positive. Skip scanning that file.
  SECRETS_SCAN_OMIT_PATHS = "server.js"
  # AI_MODEL_NAME is configuration, not a secret; its model id may appear in
  # serverless source or build output as a harmless default/fallback value.
  SECRETS_SCAN_OMIT_KEYS = "AI_MODEL_NAME,RENDER_TIMEOUT_MS"

# Netlify's default synchronous function timeout is 10s, but AI image
# generation (run-workflow, steal-tattoo) routinely takes 10-25s. Without
# this, Lambda kills the function mid-call and the client just sees a
# generic 502. Extending to 26s (the max for synchronous functions) needs
# a paid plan -- on the free/Starter plan this setting is ignored and
# capped at 10s regardless.
[functions."run-workflow"]
  timeout = 26

[functions."steal-tattoo"]
  timeout = 26

# 1. SECURITY: Block public web access to configuration and backend files
[[redirects]]
  from = "/netlify.toml"
  to = "/"
  status = 404

[[redirects]]
  from = "/netlify/*"
  to = "/"
  status = 404

# 2. UPLOADS PROXY FIXED: Map static upload assets to your function using :splat
[[redirects]]
  from = "/uploads/*"
  to = "/.netlify/functions/get-upload?filename=:splat"
  status = 200

# 3. API ROUTING: Route every /api/* call to a Netlify Function of the same name.
[[redirects]]
  from = "/api/status"
  to = "/.netlify/functions/status"
  status = 200

[[redirects]]
  from = "/api/upload/body"
  to = "/.netlify/functions/upload?kind=body"
  status = 200

[[redirects]]
  from = "/api/upload/tattoo"
  to = "/.netlify/functions/upload?kind=tattoo"
  status = 200

[[redirects]]
  from = "/api/upload/steal-source"
  to = "/.netlify/functions/upload?kind=steal-source"
  status = 200

[[redirects]]
  from = "/api/upload/composite"
  to = "/.netlify/functions/upload?kind=composite"
  status = 200

[[redirects]]
  from = "/api/steal-tattoo"
  to = "/.netlify/functions/steal-tattoo"
  status = 200

[[redirects]]
  from = "/api/run-workflow"
  to = "/.netlify/functions/run-workflow"
  status = 200

[[redirects]]
  from = "/api/clear-uploads"
  to = "/.netlify/functions/clear-uploads"
  status = 200