[build]
  # No bundler/build step needed — the frontend is plain static files.
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # server.js is the local-only dev server (not used by Netlify Functions).
  # Its default fallback values for PORT / RENDER_TIMEOUT_MS happen to match
  # the literal values of the build's env vars of the same name, which trips
  # Netlify's secrets scanner as a false positive. Skip scanning that file.
  SECRETS_SCAN_OMIT_PATHS = "server.js"

# Route every /api/* call to a Netlify Function of the same name.
# e.g. /api/status -> netlify/functions/status.js
[[redirects]]
  from = "/api/status"
  to = "/.netlify/functions/status"
  status = 200

[[redirects]]
  from = "/api/upload/:kind"
  to = "/.netlify/functions/upload?kind=:kind"
  status = 200

[[redirects]]
  from = "/api/steal-tattoo"
  to = "/.netlify/functions/steal-tattoo"
  status = 200

[[redirects]]
  from = "/api/run-workflow"
  to = "/.netlify/functions/run-workflow"
  status = 200

[[redirects]]
  from = "/api/clear-uploads"
  to = "/.netlify/functions/clear-uploads"
  status = 200

# Serve stored uploads/results out of Netlify Blobs instead of a real
# /uploads folder on disk (Netlify Functions have no persistent disk).
[[redirects]]
  from = "/uploads/:filename"
  to = "/.netlify/functions/get-upload?filename=:filename"
  status = 200
